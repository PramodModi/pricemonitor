<div class="preview-card">
    <div style="display:flex;align-items:flex-start;gap:16px;">
        <div style="flex-shrink:0;">
            {image_block}
        </div>
        <div style="flex:1;">
            <div class="product-name" style="font-size:16px;">{product_name}</div>
            {brand_block}
            <div style="margin:6px 0;">
                <span class="platform-badge">{platform_icon} {platform_label}</span>
                <span class="{availability_class}">{availability_text}</span>
            </div>
            <div class="price-live">{live_price}</div>
            <div class="product-meta" style="color:#6b7280;font-size:12px;">Live price from marketplace</div>
            {price_change_block}
            {rating_block}
            {seller_block}
        </div>
    </div>
    {catalog_block}
</div>
